{% extends "layout.html" %}
{% block title %}Edit User - Admin Central{% endblock %}
{% block content %}
<div class="animate-fade-in" style="max-width: 600px; margin: 0 auto;">
    <a href="{{ url_for('dashboard') }}" style="color: var(--text-muted); display: block; margin-bottom: 2rem;">← Back to Admin Central</a>
    
    <div class="glass-card" style="padding: 3rem;">
        <h2 style="margin-bottom: 2rem; font-weight: 800;">Edit User: {{ user_to_edit.username }}</h2>
        
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" value="{{ user_to_edit.username }}" required>
            </div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" value="{{ user_to_edit.email }}" required>
            </div>
            
            <div class="form-group">
                <label>System Role</label>
                <select name="role" class="form-control">
                    <option value="student" {% if user_to_edit.role == 'student' %}selected{% endif %}>Student</option>
                    <option value="instructor" {% if user_to_edit.role == 'instructor' %}selected{% endif %}>Instructor</option>
                    <option value="admin" {% if user_to_edit.role == 'admin' %}selected{% endif %}>Admin</option>
                </select>
            </div>
            
            <div style="margin-top: 3rem; display: flex; gap: 1rem;">
                <a href="{{ url_for('dashboard') }}" class="btn" style="flex: 1; border: 1px solid var(--border-color); text-align: center; display: inline-block; padding: 0.8rem;">Cancel</a>
                <button type="submit" class="btn btn-primary" style="flex: 2;">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
