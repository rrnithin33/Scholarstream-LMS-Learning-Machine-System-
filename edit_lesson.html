{% extends "layout.html" %}
{% block title %}Edit Lesson - ScholarStream{% endblock %}
{% block content %}
<div class="animate-fade-in" style="max-width: 600px; margin: 0 auto;">
    <a href="{{ url_for('course_detail', course_id=lesson.course_id) }}" style="color: var(--text-muted); display: block; margin-bottom: 2rem;">← Back to Course</a>
    
    <div class="glass-card" style="padding: 3rem;">
        <h2 style="margin-bottom: 2rem; font-weight: 800;">Edit Lesson</h2>
        
        <form action="{{ url_for('edit_lesson', lesson_id=lesson.id) }}" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Lesson Title</label>
                <input type="text" name="title" class="form-control" value="{{ lesson.title }}" required>
            </div>
            
            <div class="form-group">
                <label>Content Type</label>
                <select name="content_type" class="form-control">
                    <option value="video" {% if lesson.content_type == 'video' %}selected{% endif %}>Video (MP4)</option>
                    <option value="pdf" {% if lesson.content_type == 'pdf' %}selected{% endif %}>PDF Document</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Update File (Optional)</label>
                <div style="margin-bottom: 1rem; padding: 1rem; background: rgba(255,255,255,0.05); border-radius: 0.5rem;">
                    <p style="font-size: 0.85rem; margin-bottom: 0.5rem;">Current File: <span style="font-weight: 700; color: var(--primary);">{{ lesson.content_url }}</span></p>
                </div>
                <input type="file" name="content_file" class="form-control">
                <small style="color: var(--text-muted);">Leave empty to keep the existing file.</small>
            </div>
            
            <div style="margin-top: 3rem; display: flex; gap: 1rem;">
                <a href="{{ url_for('course_detail', course_id=lesson.course_id) }}" class="btn" style="flex: 1; border: 1px solid var(--border-color); text-align: center; display: inline-block; padding: 0.8rem;">Cancel</a>
                <button type="submit" class="btn btn-primary" style="flex: 2;">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
