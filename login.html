{% extends "layout.html" %}
{% block title %}Login - ScholarStream LMS{% endblock %}
{% block content %}
<div style="max-width: 450px; margin: 4rem auto;" class="animate-fade-in">
    <div class="glass-card">
        <h2 style="margin-bottom: 0.5rem; font-size: 2rem;">Welcome Back</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Please enter your details to sign in.</p>
        
        <form method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" class="form-control" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
        </form>
        
        <p style="text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary); font-weight: 600;">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
