{% extends "layout.html" %}
{% block title %}Sign Up - ScholarStream LMS{% endblock %}
{% block content %}
<div style="max-width: 450px; margin: 4rem auto;" class="animate-fade-in">
    <div class="glass-card">
        <h2 style="margin-bottom: 0.5rem; font-size: 2rem;">Join ScholarStream</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Start your journey with us today.</p>
        
        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="johndoe" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" class="form-control" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="role">Sign Up As</label>
                <select name="role" id="role" class="form-control" required>
                    <option value="student">Student</option>
                    <option value="instructor">Instructor</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
        </form>
        
        <p style="text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
            Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 600;">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
