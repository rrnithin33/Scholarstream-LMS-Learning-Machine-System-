{% extends "layout.html" %}
{% block title %}Add New Assignment - {{ course_id }}{% endblock %}
{% block content %}
<div style="max-width: 600px; margin: 2rem auto;" class="animate-fade-in">
    <a href="{{ url_for('course_detail', course_id=course_id) }}" style="color: var(--text-muted); display: block; margin-bottom: 2rem;">← Back to Course</a>
    <div class="glass-card">
        <h2 style="margin-bottom: 2rem; font-size: 2rem;">New Assignment</h2>
        <form method="POST">
            <div class="form-group">
                <label>Assignment Title</label>
                <input type="text" name="title" class="form-control" placeholder="e.g. Final Project: Building a Flask App" required>
            </div>
            <div class="form-group">
                <label>Description (Instructions)</label>
                <textarea name="description" class="form-control" rows="5" required placeholder="Describe the task and requirements."></textarea>
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="datetime-local" name="due_date" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 2rem;">Add Assignment</button>
        </form>
    </div>
</div>
{% endblock %}
