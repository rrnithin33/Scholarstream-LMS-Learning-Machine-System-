{% extends "layout.html" %}
{% block title %}Create New Course - ScholarStream LMS{% endblock %}
{% block content %}
<div style="max-width: 600px; margin: 2rem auto;" class="animate-fade-in">
    <a href="{{ url_for('dashboard') }}" style="color: var(--text-muted); display: block; margin-bottom: 1rem;">← Back to Dashboard</a>
    <div class="glass-card">
        <h2 style="margin-bottom: 2rem; font-size: 2rem;">Create New Course</h2>
        
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="title">Course Title</label>
                <input type="text" name="title" id="title" class="form-control" placeholder="e.g. Master Python Programming" required>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea name="description" id="description" class="form-control" rows="5" placeholder="What will students learn in this course?" required></textarea>
            </div>
            <div class="form-group">
                <label for="thumbnail">Course Thumbnail</label>
                <input type="file" name="thumbnail" id="thumbnail" class="form-control" accept="image/*">
                <small style="color: var(--text-muted); margin-top: 0.5rem; display: block;">Recommended size: 800x450px</small>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 2rem;">Create Course</button>
        </form>
    </div>
</div>
{% endblock %}
